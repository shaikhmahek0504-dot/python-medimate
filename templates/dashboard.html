{% extends 'base.html' %}
{% block content %}

<a href="/add">Add Medicine</a>

<table>
<tr>
    <th>Name</th>
    <th>Time</th>
    <th>Dosage</th>
    <th>Action</th>
</tr>

{% for med in medicines %}
<tr>
    <td>{{ med.name }}</td>
    <td>{{ med.time }}</td>
    <td>{{ med.dosage }}</td>
    <td><a href="/delete/{{ med.id }}">Delete</a></td>
</tr>
{% endfor %}

</table>

{% endblock %}
